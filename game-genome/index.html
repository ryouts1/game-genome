<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>game-genome</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel sidebar">
        <div>
          <p class="eyebrow">game-genome</p>
          <h1>JSON 定義型ボードゲーム実験場</h1>
          <p class="lede">
            同じ UI / ルールエンジン / AI を使い回しながら、ゲーム定義だけ差し替えて派生 repo を作るための土台です。
          </p>
        </div>

        <section class="control-group">
          <label for="game-selector">ゲーム</label>
          <select id="game-selector"></select>
          <p id="game-summary" class="muted"></p>
        </section>

        <section class="control-group two-column">
          <div>
            <label for="player-one-controller">Player 1</label>
            <select id="player-one-controller">
              <option value="human">Human</option>
              <option value="minimax">Minimax</option>
              <option value="mcts">MCTS</option>
            </select>
          </div>
          <div>
            <label for="player-two-controller">Player 2</label>
            <select id="player-two-controller">
              <option value="human">Human</option>
              <option value="minimax">Minimax</option>
              <option value="mcts">MCTS</option>
            </select>
          </div>
        </section>

        <section class="control-group two-column">
          <div>
            <label for="minimax-depth">Minimax depth</label>
            <input id="minimax-depth" type="number" min="1" max="6" value="3" />
          </div>
          <div>
            <label for="mcts-iterations">MCTS iterations</label>
            <input id="mcts-iterations" type="number" min="50" max="5000" step="50" value="700" />
          </div>
        </section>

        <section class="control-group actions-row">
          <button id="restart-button" type="button">再開</button>
          <button id="run-ai-button" type="button">AI を 1 手進める</button>
        </section>

        <section class="control-group">
          <h2>ステータス</h2>
          <p id="status-text">読み込み中...</p>
          <div id="legend" class="legend"></div>
        </section>

        <section class="control-group">
          <h2>ゲーム定義の見どころ</h2>
          <ul id="feature-list" class="feature-list"></ul>
        </section>
      </aside>

      <main class="workspace">
        <section class="panel board-panel">
          <div class="board-toolbar">
            <div>
              <p class="eyebrow">board</p>
              <h2 id="board-title">-</h2>
            </div>
            <p id="turn-indicator" class="turn-indicator"></p>
          </div>
          <div id="board-container" class="board-container"></div>
          <p id="board-hint" class="muted board-hint"></p>
        </section>

        <section class="panel detail-panel">
          <div>
            <p class="eyebrow">details</p>
            <h2>ルール / AI / ログ</h2>
          </div>

          <div class="detail-grid">
            <section>
              <h3>ルール</h3>
              <div id="rule-summary" class="stacked-text"></div>
            </section>
            <section>
              <h3>AI の直前決定</h3>
              <div id="ai-summary" class="stacked-text"></div>
            </section>
          </div>

          <section>
            <h3>手順ログ</h3>
            <ol id="move-log" class="move-log"></ol>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
